plugins {
    id 'java'
    id('io.qameta.allure') version '3.1.0'
}

group = 'atm.timon'
version = '1.0-SNAPSHOT'

allure{
    report { //секция репорта
        version.set("2.38.1")
    }
    adapter { // отвечает за появление папочку build/allure-results
        aspectjWeaver.set(true) // обработка анотации @Step
        frameworks {
            junit5 { //название фреймворка
                adapterVersion.set("2.33.0") // версия интеграции фреймворка и Allure
            }
        }
    }
}


repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testImplementation 'com.codeborne:selenide:7.14.0'
    testImplementation 'io.qameta.allure:allure-selenide:2.33.0'
}

test {
    useJUnitPlatform()
}